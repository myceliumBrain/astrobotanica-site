<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>
(function () {
  try {
    var t = localStorage.getItem("theme");
    if (t !== "light" && t !== "dark") {
      t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }
    document.documentElement.setAttribute("data-theme", t);
  } catch (e) {}
})();
(function () {
  try {
    var l = localStorage.getItem("lang");
    if (l !== "pt" && l !== "en") {
      l = navigator.language.slice(0, 2).toLowerCase() === "en" ? "en" : "pt";
    }
    document.documentElement.setAttribute("lang", l === "en" ? "en" : "pt-BR");
  } catch (e) {}
})();
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title data-text="episodio.metaTitle">Episódio — Astrobotânica</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap header-stack">
    <a href="/" class="brand-mark" data-text="brand.name">astrobotânica</a>
    <button type="button" class="nav-toggle" aria-expanded="false" aria-controls="nav-overlay">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="visually-hidden" data-text="common.openMenu">Abrir menu</span>
    </button>
    <button type="button" class="theme-toggle" role="switch" aria-checked="false" aria-label="Alternar tema claro/escuro" data-text="common.toggleTheme" data-text-attr="aria-label">
      <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
    </button>
  </div>
</header>

<div class="nav-overlay" id="nav-overlay">
  <nav class="nav-overlay-panel">
    <button type="button" class="nav-overlay-close" aria-label="Fechar menu" data-text="common.closeMenu" data-text-attr="aria-label">✕</button>
    <a href="/noticias" data-text="nav.articles">Notícias</a>
    <a href="/podcast" aria-current="page" data-text="nav.podcast">Podcast</a>
    <a href="/sobre" data-text="nav.about">Sobre</a>
    <a href="/contato" data-text="nav.contact">Contato</a>
    <div class="lang-switch" role="group" data-text-attr="aria-label" data-text="common.language" aria-label="Idioma">
      <button type="button" class="lang-btn" data-lang="pt">PT</button>
      <button type="button" class="lang-btn" data-lang="en">EN</button>
    </div>
  </nav>
</div>

<main>
  <article class="wrap" style="padding-top:2.5rem;padding-bottom:1.5rem">
    <a href="/podcast" class="btn btn-ghost" style="margin-bottom:1rem;display:inline-block" data-text="episodio.backLink">← Voltar ao podcast</a>
    <div id="episodio-content"></div>
  </article>

  <section class="section wrap">
    <h2 style="font-size:1.4rem;margin-bottom:1.5rem" data-text="episodio.relatedHeading">Outros episódios</h2>
    <div id="episodio-related" style="display:flex;flex-direction:column;gap:0.875rem"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap footer-inner">
    <div class="footer-brand">
      <span class="footer-word" data-text="brand.name">astrobotânica</span>
      <p class="footer-tagline" data-text="brand.footerTagline">Divulgação científica sobre o reino das plantas e sua jornada para fora da Terra.</p>
    </div>
    <div class="footer-cols">
      <div class="footer-col">
        <span class="footer-heading" data-text="footer.navHeading">Navegação</span>
        <a href="/noticias" data-text="nav.articles">Notícias</a>
        <a href="/podcast" data-text="nav.podcast">Podcast</a>
        <a href="/sobre" data-text="nav.about">Sobre</a>
        <a href="/contato" data-text="nav.contact">Contato</a>
      </div>
      <div class="footer-col" id="footer-social-col" hidden>
        <span class="footer-heading" data-text="footer.socialHeading">Redes sociais</span>
        <div id="footer-social"></div>
      </div>
    </div>
  </div>
  <div class="wrap footer-copy" data-text="brand.copyright">© 2026 Astrobotânica.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/i18next@23.16.8/dist/umd/i18next.min.js"></script>
<script type="module" src="dist/main.js"></script>
</body>
</html>
